services:
  - type: web
    name: antibiotic-susceptibility-reporting-system
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT wsgi:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: SYSTEM_PIN
        value: "1234"
